<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CCA-F Practice — Claude AI Architect</title>
<style>
  :root{
    --ink:#1c2321;
    --paper:#f6f4ee;
    --panel:#ffffff;
    --line:#d9d4c7;
    --accent:#2f5d50;
    --accent-soft:#e4ece8;
    --warn:#8a4b3b;
    --warn-soft:#f3e4df;
    --mono: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:24px; background:var(--paper); color:var(--ink);
    font-family: Georgia, 'Iowan Old Style', serif;
    line-height:1.5;
  }
  .wrap{max-width:1000px; margin:0 auto;}
  h1{font-size:1.05rem; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin:0 0 4px;}
  .domain{font-family:var(--mono); font-size:.75rem; color:#6b6558; margin-bottom:18px;}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:20px 24px; margin-bottom:18px;
  }
  .card h2{font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--warn); margin:0 0 10px;}
  .card p{margin:0 0 10px; font-size:.98rem;}
  .constraints{font-family:var(--mono); font-size:.85rem; background:var(--accent-soft); border-radius:4px; padding:12px 16px;}
  .constraints div{margin-bottom:4px;}
  .options{display:grid; gap:8px; margin-top:6px;}
  .opt{
    border:1px solid var(--line); border-radius:5px; padding:10px 14px;
    font-size:.92rem; background:#fdfcf9; cursor:pointer;
    transition: background .15s, border-color .15s;
  }
  .opt:hover{border-color:var(--accent);}
  .opt b{color:var(--accent); font-family:var(--mono); margin-right:6px;}
  .opt.picked{border-color:var(--accent); background:var(--accent-soft);}
  .opt.correct-pick{border-color:var(--accent); background:var(--accent-soft); font-weight:bold;}
  .opt.wrong-pick{border-color:var(--warn); background:var(--warn-soft);}
  .opt.correct-reveal{border-color:var(--accent); border-style:dashed;}

  .picker{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .picker label{font-family:var(--mono); font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:#6b6558;}
  select#questionSelect{
    flex:1; min-width:240px; font-family:var(--mono); font-size:.85rem;
    padding:8px 10px; border:1px solid var(--line); border-radius:4px;
    background:#fdfcf9; color:var(--ink);
  }

  .progressCard{padding:14px 24px;}
  .progressBarOuter{width:100%; height:8px; border-radius:4px; background:var(--line); overflow:hidden;}
  .progressBarInner{height:100%; width:0%; background:var(--accent); transition:width .25s;}
  .progressText{font-family:var(--mono); font-size:.72rem; color:#6b6558; margin-top:8px;}

  .gapList{display:flex; flex-direction:column; gap:4px; margin-top:8px;}
  .gapItem{font-family:var(--mono); font-size:.8rem; padding:6px 10px; border-radius:4px; cursor:pointer; border:1px solid transparent;}
  .gapItem:hover{background:var(--accent-soft);}
  .gapItem.gap-correct{color:var(--accent);}
  .gapItem.gap-incorrect{color:var(--warn); font-weight:bold;}
  .gapItem.gap-pending{color:#8a8578;}
  .gapIcon{display:inline-block; width:1.4em;}

  textarea{
    width:100%; min-height:110px; resize:vertical;
    font-family:var(--mono); font-size:.9rem; color:var(--ink);
    border:1px solid var(--line); border-radius:5px; padding:12px;
    background:#fdfcf9;
  }
  .row{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap;}
  button{
    font-family:var(--mono); font-size:.75rem; letter-spacing:.03em;
    text-transform:uppercase; border:1px solid var(--accent); color:var(--accent);
    background:transparent; padding:7px 12px; border-radius:4px; cursor:pointer;
  }
  button.active, button:hover{background:var(--accent); color:#fff;}
  button.ghost{border-color:var(--line); color:#6b6558;}
  button.ghost:hover{background:var(--line); color:var(--ink);}
  button.ghost.active{border-color:var(--accent); color:var(--accent); background:var(--accent-soft);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  .status{font-family:var(--mono); font-size:.72rem; color:#8a8578; margin-left:auto;}

  .hint{font-size:.75rem; color:#8a8578; margin-top:6px;}

  /* ---- Whiteboard window ---- */
  .wb-window{padding:0; overflow:hidden;}
  .wb-titlebar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; border-bottom:1px solid var(--line); background:#fbfaf6;
  }
  .wb-titlebar .wb-title{
    font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--warn);
    font-family: Georgia, 'Iowan Old Style', serif;
  }
  .wb-close{
    border:1px solid var(--line); color:#6b6558; background:transparent;
    width:26px; height:26px; border-radius:4px; font-family:var(--mono); font-size:.85rem;
    line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;
  }
  .wb-close:hover{background:var(--warn); border-color:var(--warn); color:#fff;}

  .wb-textSection{padding:16px 20px 4px;}
  .wb-textSection textarea{min-height:70px;}
  .wb-textSection.collapsed{display:none;}

  .wb-divider{display:flex; justify-content:center; padding:2px 20px;}
  .wb-collapseBtn{
    border:none; background:transparent; color:#8a8578; cursor:pointer;
    width:100%; padding:4px 0; display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .wb-collapseBtn:hover{color:var(--accent);}
  .wb-collapseBtn::before, .wb-collapseBtn::after{content:''; flex:1; height:1px; background:var(--line);}
  .wb-collapseBtn svg{transition:transform .2s; flex:none;}
  .wb-collapseBtn.collapsed svg{transform:rotate(180deg);}

  .wb-drawSection{display:flex; gap:10px; padding:12px 20px 8px; align-items:flex-start;}
  .wb-toolbar{display:flex; flex-direction:column; gap:6px; flex:none;}
  .wb-toolbar button{
    width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line); color:#6b6558; background:#fdfcf9; border-radius:5px; cursor:pointer;
  }
  .wb-toolbar button:hover{border-color:var(--accent); color:var(--accent); background:#fdfcf9;}
  .wb-toolbar button.active{border-color:var(--accent); background:var(--accent-soft); color:var(--accent);}
  .wb-toolbar button:disabled{opacity:.35; cursor:not-allowed;}
  .wb-toolbar button:disabled:hover{border-color:var(--line); color:#6b6558; background:#fdfcf9;}
  .wb-toolbar .wb-sep{height:1px; background:var(--line); margin:4px 2px;}

  .wb-canvasWrap{flex:1; min-width:0;}
  #wbCanvas{
    display:block; width:100%; height:340px;
    border:1px dashed var(--line); border-radius:5px; background:
      repeating-linear-gradient(0deg, transparent, transparent 23px, #eeeae0 24px),
      #fdfcf9;
    cursor:crosshair; touch-action:none;
  }
  .wb-status{padding:0 20px 18px; font-size:.75rem; color:#8a8578;}

  .reveal{
    margin-top:8px; padding:14px 16px; border-left:3px solid var(--accent);
    background:var(--accent-soft); font-size:.9rem; display:none;
  }
  .reveal.shown{display:block;}
  .reveal h3{margin:0 0 6px; font-size:.8rem; text-transform:uppercase; letter-spacing:.06em; color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Claude Certified Architect — Practice</h1>
  <div class="domain" id="domain">Domain: loading…</div>

  <div class="card progressCard">
    <div class="progressBarOuter"><div class="progressBarInner" id="progressBarInner"></div></div>
    <div class="progressText" id="progressText">loading progress…</div>
  </div>

  <div class="card picker">
    <label for="questionSelect">Question</label>
    <select id="questionSelect"></select>
    <button class="ghost" id="wrongOnlyBtn">Focus: wrong only</button>
  </div>

  <div class="card">
    <div class="row" style="margin-top:0;">
      <h2 style="margin:0;">Gap analysis</h2>
      <button class="ghost" id="gapBtn" style="margin-left:auto;">Show gap analysis</button>
    </div>
    <div class="reveal" id="gapBox"></div>
  </div>

  <div class="card">
    <h2>Scenario</h2>
    <p id="scenarioText"></p>
    <div class="constraints" id="constraintsBox"></div>
  </div>

  <div class="card">
    <h2>Question</h2>
    <p id="questionText"></p>
    <div class="options" id="optionsBox"></div>
    <div class="row">
      <button id="checkBtn">Check answer</button>
      <span class="status" id="mcqStatus">not answered yet</span>
    </div>
  </div>

  <div class="card">
    <h2>Your answer — in your own words</h2>
    <textarea id="answerBox" placeholder="Which option, and why — write it your own way..."></textarea>
    <div class="row">
      <button id="saveBtn">Save</button>
      <button class="ghost" id="revealBtn">Reveal answer key</button>
      <span class="status" id="status">not saved yet</span>
    </div>
  </div>

  <div class="card wb-window" id="wbWindow">
    <div class="wb-titlebar">
      <span class="wb-title">Whiteboard</span>
      <button class="wb-close" id="wbCloseBtn" title="Close whiteboard">✕</button>
    </div>

    <div class="wb-textSection" id="wbTextSection">
      <textarea id="wbTextBox" placeholder="Type notes here..."></textarea>
    </div>

    <div class="wb-divider">
      <button class="wb-collapseBtn" id="wbCollapseBtn" title="Collapse/expand notes">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <div class="wb-drawSection">
      <div class="wb-toolbar">
        <button id="wbPenBtn" class="active" title="Pen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button id="wbEraserBtn" title="Eraser">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H9L4.5 15.5a2 2 0 0 1 0-2.8l8-8a2 2 0 0 1 2.8 0l5 5a2 2 0 0 1 0 2.8L13 20"/><path d="M8 13l5 5"/></svg>
        </button>
        <div class="wb-sep"></div>
        <button id="wbUndoBtn" title="Undo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
        </button>
        <button id="wbRedoBtn" title="Redo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
        </button>
        <div class="wb-sep"></div>
        <button id="wbClearBtn" title="Clear canvas">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
      <div class="wb-canvasWrap">
        <canvas id="wbCanvas"></canvas>
      </div>
    </div>

    <div class="wb-status" id="wbStatus">whiteboard not saved yet</div>
  </div>
  <button class="ghost" id="wbOpenBtn" style="display:none;">Open whiteboard</button>

  <div class="reveal" id="revealBox"></div>
</div>

<script>
// ---- Cookie storage ----
function setCookie(name, value, days){
  const expires = new Date(Date.now() + days*24*60*60*1000).toUTCString();
  document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
}
function getCookie(name){
  const prefix = name + '=';
  const parts = document.cookie.split('; ');
  for(const part of parts){
    if(part.indexOf(prefix) === 0) return decodeURIComponent(part.slice(prefix.length));
  }
  return null;
}
function getResult(qid){ return getCookie(qid + '_result'); }
function getSelected(qid){ return getCookie(qid + '_selected'); }
function setResult(qid, result, key){
  setCookie(qid + '_result', result, 365);
  setCookie(qid + '_selected', key, 365);
}

let questions = [];
let current = null;
let currentShuffled = [];
let pickedKey = null;
let wrongOnlyMode = false;

const domainEl = document.getElementById('domain');
const questionSelect = document.getElementById('questionSelect');
const wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
const gapBtn = document.getElementById('gapBtn');
const gapBox = document.getElementById('gapBox');
const progressBarInner = document.getElementById('progressBarInner');
const progressText = document.getElementById('progressText');
const scenarioText = document.getElementById('scenarioText');
const constraintsBox = document.getElementById('constraintsBox');
const questionText = document.getElementById('questionText');
const optionsBox = document.getElementById('optionsBox');
const checkBtn = document.getElementById('checkBtn');
const mcqStatus = document.getElementById('mcqStatus');
const answerBox = document.getElementById('answerBox');
const status = document.getElementById('status');
const revealBtn = document.getElementById('revealBtn');
const revealBox = document.getElementById('revealBox');
const saveBtn = document.getElementById('saveBtn');

let revealed = false;
revealBtn.addEventListener('click', () => {
  revealed = !revealed;
  revealBox.classList.toggle('shown', revealed);
  revealBtn.textContent = revealed ? 'Hide answer key' : 'Reveal answer key';
});

function saveAnswer(){
  try{
    setCookie(current.id + '_answer', answerBox.value, 365);
    status.textContent = 'saved ' + new Date().toLocaleTimeString();
  }catch(e){
    status.textContent = 'save failed';
  }
}
saveBtn.addEventListener('click', saveAnswer);

function loadAnswer(){
  const val = getCookie(current.id + '_answer');
  answerBox.value = val || '';
  status.textContent = val ? 'loaded from last visit' : 'not saved yet';
}

// ---- Progress & gap analysis ----
function computeStats(){
  return questions.map((q, i) => ({ id: q.id, index: i, domain: q.domain, result: getResult(q.id) }));
}

function updateProgress(){
  const stats = computeStats();
  const total = stats.length;
  const correct = stats.filter(s => s.result === 'correct').length;
  const incorrect = stats.filter(s => s.result === 'incorrect').length;
  const attempted = correct + incorrect;
  const pct = total ? Math.round((attempted / total) * 100) : 0;
  progressBarInner.style.width = pct + '%';
  progressText.textContent = attempted + '/' + total + ' answered · ' + correct + ' correct · ' + incorrect + ' to review';
}

function renderGapAnalysis(){
  const stats = computeStats();
  const correct = stats.filter(s => s.result === 'correct').length;
  const incorrect = stats.filter(s => s.result === 'incorrect').length;
  const total = stats.length;
  let html = '<p><b>' + correct + '/' + total + '</b> correct · <b>' + incorrect + '</b> to review · <b>' + (total - correct - incorrect) + '</b> not attempted yet.</p>';
  html += '<div class="gapList">' + stats.map(s => {
    const icon = s.result === 'correct' ? '✓' : s.result === 'incorrect' ? '✗' : '·';
    const cls = s.result === 'correct' ? 'gap-correct' : s.result === 'incorrect' ? 'gap-incorrect' : 'gap-pending';
    return '<div class="gapItem ' + cls + '" data-qid="' + s.id + '"><span class="gapIcon">' + icon + '</span>Q' + (s.index + 1) + '. ' + s.domain + '</div>';
  }).join('') + '</div>';
  gapBox.innerHTML = html;
  gapBox.querySelectorAll('.gapItem').forEach(el => {
    el.addEventListener('click', () => {
      wrongOnlyMode = false;
      wrongOnlyBtn.classList.remove('active');
      wrongOnlyBtn.textContent = 'Focus: wrong only';
      buildQuestionSelect();
      loadQuestion(el.dataset.qid);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

gapBtn.addEventListener('click', () => {
  const showing = gapBox.classList.contains('shown');
  if(!showing) renderGapAnalysis();
  gapBox.classList.toggle('shown');
  gapBtn.textContent = gapBox.classList.contains('shown') ? 'Hide gap analysis' : 'Show gap analysis';
});

// ---- Question picker / wrong-only filter ----
function buildQuestionSelect(){
  let list = questions;
  if(wrongOnlyMode){
    list = questions.filter(q => getResult(q.id) === 'incorrect');
  }
  if(list.length === 0){
    questionSelect.innerHTML = '<option value="">No wrong answers to review 🎉</option>';
    questionSelect.disabled = true;
    return list;
  }
  questionSelect.disabled = false;
  questionSelect.innerHTML = list.map(q => {
    const idx = questions.indexOf(q);
    return '<option value="' + q.id + '">Q' + (idx + 1) + '. ' + q.domain + '</option>';
  }).join('');
  return list;
}

wrongOnlyBtn.addEventListener('click', () => {
  wrongOnlyMode = !wrongOnlyMode;
  wrongOnlyBtn.classList.toggle('active', wrongOnlyMode);
  wrongOnlyBtn.textContent = wrongOnlyMode ? 'Focus: wrong only ✓' : 'Focus: wrong only';
  const list = buildQuestionSelect();
  if(list.length) loadQuestion(list[0].id);
});

// ---- Whiteboard ----
const wbWindow = document.getElementById('wbWindow');
const wbOpenBtn = document.getElementById('wbOpenBtn');
const wbCloseBtn = document.getElementById('wbCloseBtn');
const wbTextSection = document.getElementById('wbTextSection');
const wbTextBox = document.getElementById('wbTextBox');
const wbCollapseBtn = document.getElementById('wbCollapseBtn');
const wbPenBtn = document.getElementById('wbPenBtn');
const wbEraserBtn = document.getElementById('wbEraserBtn');
const wbUndoBtn = document.getElementById('wbUndoBtn');
const wbRedoBtn = document.getElementById('wbRedoBtn');
const wbClearBtn = document.getElementById('wbClearBtn');
const wbStatus = document.getElementById('wbStatus');
const wbCanvas = document.getElementById('wbCanvas');
const wctx = wbCanvas.getContext('2d');

let wbTool = 'pen';
let wbStrokes = [];
let wbRedoStack = [];
let wbCurrentStroke = null;
let wbLastPoint = null;
let wbTextSaveTimer = null;

function wbUpdateToolbarState(){
  wbPenBtn.classList.toggle('active', wbTool === 'pen');
  wbEraserBtn.classList.toggle('active', wbTool === 'eraser');
  wbUndoBtn.disabled = wbStrokes.length === 0;
  wbRedoBtn.disabled = wbRedoStack.length === 0;
}

function wbSetTool(t){
  wbTool = t;
  wbUpdateToolbarState();
}
wbPenBtn.addEventListener('click', () => wbSetTool('pen'));
wbEraserBtn.addEventListener('click', () => wbSetTool('eraser'));

wbCloseBtn.addEventListener('click', () => {
  wbWindow.style.display = 'none';
  wbOpenBtn.style.display = '';
});
wbOpenBtn.addEventListener('click', () => {
  wbWindow.style.display = '';
  wbOpenBtn.style.display = 'none';
});

let wbNotesCollapsed = false;
wbCollapseBtn.addEventListener('click', () => {
  wbNotesCollapsed = !wbNotesCollapsed;
  wbTextSection.classList.toggle('collapsed', wbNotesCollapsed);
  wbCollapseBtn.classList.toggle('collapsed', wbNotesCollapsed);
});

function wbSaveText(){
  try{
    setCookie(current.id + '_wb_text', wbTextBox.value, 365);
    wbStatus.textContent = 'saved ' + new Date().toLocaleTimeString();
  }catch(e){
    wbStatus.textContent = 'save failed';
  }
}
wbTextBox.addEventListener('input', () => {
  clearTimeout(wbTextSaveTimer);
  wbTextSaveTimer = setTimeout(wbSaveText, 400);
});

function wbPersistStrokes(){
  try{
    setCookie(current.id + '_wb_strokes', JSON.stringify(wbStrokes), 365);
    wbStatus.textContent = 'saved ' + new Date().toLocaleTimeString();
  }catch(e){
    wbStatus.textContent = 'save failed';
  }
}

function wbDrawStroke(s){
  wctx.save();
  wctx.lineJoin = 'round';
  wctx.lineCap = 'round';
  wctx.lineWidth = s.size;
  if(s.tool === 'eraser'){
    wctx.globalCompositeOperation = 'destination-out';
    wctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    wctx.globalCompositeOperation = 'source-over';
    wctx.strokeStyle = s.color || '#2f5d50';
  }
  wctx.beginPath();
  s.points.forEach((p, i) => {
    if(i === 0) wctx.moveTo(p.x, p.y);
    else wctx.lineTo(p.x, p.y);
  });
  if(s.points.length === 1){
    wctx.lineTo(s.points[0].x + 0.01, s.points[0].y + 0.01);
  }
  wctx.stroke();
  wctx.restore();
}

function wbClearPixels(){
  const rect = wbCanvas.getBoundingClientRect();
  wctx.save();
  wctx.globalCompositeOperation = 'destination-out';
  wctx.fillStyle = 'rgba(0,0,0,1)';
  wctx.fillRect(0, 0, rect.width, rect.height);
  wctx.restore();
}

function wbReplayAll(){
  wbClearPixels();
  wbStrokes.forEach(wbDrawStroke);
}

function wbResizeCanvas(){
  const rect = wbCanvas.getBoundingClientRect();
  wbCanvas.width = rect.width * devicePixelRatio;
  wbCanvas.height = rect.height * devicePixelRatio;
  wctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  wbReplayAll();
}
window.addEventListener('resize', wbResizeCanvas);

function wbGetPos(e){
  const rect = wbCanvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function wbPointerDown(e){
  e.preventDefault();
  const p = wbGetPos(e);
  wbCurrentStroke = { tool: wbTool, size: wbTool === 'eraser' ? 18 : 2.2, color: '#2f5d50', points: [p] };
  wbLastPoint = p;
}
function wbPointerMove(e){
  if(!wbCurrentStroke) return;
  const p = wbGetPos(e);
  wbDrawStroke({ tool: wbCurrentStroke.tool, size: wbCurrentStroke.size, color: wbCurrentStroke.color, points: [wbLastPoint, p] });
  wbCurrentStroke.points.push(p);
  wbLastPoint = p;
}
function wbPointerUp(){
  if(!wbCurrentStroke) return;
  wbStrokes.push(wbCurrentStroke);
  wbRedoStack = [];
  wbCurrentStroke = null;
  wbLastPoint = null;
  wbUpdateToolbarState();
  wbPersistStrokes();
}
wbCanvas.addEventListener('mousedown', wbPointerDown);
wbCanvas.addEventListener('mousemove', wbPointerMove);
window.addEventListener('mouseup', wbPointerUp);

wbUndoBtn.addEventListener('click', () => {
  if(!wbStrokes.length) return;
  wbRedoStack.push(wbStrokes.pop());
  wbReplayAll();
  wbUpdateToolbarState();
  wbPersistStrokes();
});
wbRedoBtn.addEventListener('click', () => {
  if(!wbRedoStack.length) return;
  const s = wbRedoStack.pop();
  wbStrokes.push(s);
  wbDrawStroke(s);
  wbUpdateToolbarState();
  wbPersistStrokes();
});
wbClearBtn.addEventListener('click', () => {
  wbStrokes = [];
  wbRedoStack = [];
  wbReplayAll();
  wbUpdateToolbarState();
  wbPersistStrokes();
  wbStatus.textContent = 'whiteboard cleared';
});

function wbLoad(){
  wbTextBox.value = getCookie(current.id + '_wb_text') || '';
  wbStrokes = [];
  wbRedoStack = [];
  try{
    const val = getCookie(current.id + '_wb_strokes');
    if(val) wbStrokes = JSON.parse(val);
  }catch(e){ wbStrokes = []; }
  wbReplayAll();
  wbUpdateToolbarState();
  wbStatus.textContent = (wbTextBox.value || wbStrokes.length) ? 'loaded from last visit' : 'whiteboard not saved yet';
}

// ---- Option shuffling & grading ----
function shuffleOptions(q){
  const arr = q.options.map(o => ({ originalKey: o.key, text: o.text }));
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  const labels = ['A', 'B', 'C', 'D'];
  arr.forEach((o, i) => { o.displayKey = labels[i] || String(i + 1); });
  return arr;
}

function labelFor(originalKey){
  const found = currentShuffled.find(o => o.originalKey === originalKey);
  return found ? found.displayKey : originalKey;
}

function applyGrading(selectedKey, isCorrect){
  optionsBox.querySelectorAll('.opt').forEach(o => o.classList.remove('picked','correct-pick','wrong-pick','correct-reveal'));
  const pickedEl = optionsBox.querySelector('.opt[data-key="' + selectedKey + '"]');
  if(pickedEl) pickedEl.classList.add(isCorrect ? 'correct-pick' : 'wrong-pick');
  if(!isCorrect){
    const correctEl = optionsBox.querySelector('.opt[data-key="' + current.correct + '"]');
    if(correctEl) correctEl.classList.add('correct-reveal');
  }
}

function attachOptionHandlers(){
  optionsBox.querySelectorAll('.opt').forEach(el => {
    el.addEventListener('click', () => {
      pickedKey = el.dataset.key;
      optionsBox.querySelectorAll('.opt').forEach(o => o.classList.remove('picked','correct-pick','wrong-pick','correct-reveal'));
      el.classList.add('picked');
      mcqStatus.textContent = 'selected ' + el.querySelector('b').textContent + ' — click Check answer';
    });
  });
}

checkBtn.addEventListener('click', () => {
  if(!pickedKey){
    mcqStatus.textContent = 'pick an option first';
    return;
  }
  const isCorrect = pickedKey === current.correct;
  setResult(current.id, isCorrect ? 'correct' : 'incorrect', pickedKey);
  applyGrading(pickedKey, isCorrect);
  mcqStatus.textContent = isCorrect ? '✓ correct' : '✗ not quite — correct answer highlighted';
  revealed = true;
  revealBox.classList.add('shown');
  revealBtn.textContent = 'Hide answer key';
  updateProgress();
  if(gapBox.classList.contains('shown')) renderGapAnalysis();
  if(wrongOnlyMode) buildQuestionSelect();
});

// ---- Question rendering ----
function renderQuestion(){
  domainEl.textContent = 'Domain: ' + current.domain;
  scenarioText.innerHTML = current.scenario;

  if(current.constraints && current.constraints.length){
    constraintsBox.style.display = '';
    constraintsBox.innerHTML = current.constraints.map(c => '<div><b>' + c.label + ':</b> ' + c.text + '</div>').join('');
  } else {
    constraintsBox.style.display = 'none';
    constraintsBox.innerHTML = '';
  }

  questionText.textContent = current.question;

  currentShuffled = shuffleOptions(current);
  optionsBox.innerHTML = currentShuffled.map(o =>
    '<div class="opt" data-key="' + o.originalKey + '"><b>' + o.displayKey + '.</b> ' + o.text + '</div>'
  ).join('');
  attachOptionHandlers();

  const revealHtml = () => {
    let html = '<h3>Answer key</h3><p><b>Correct: ' + labelFor(current.correct) + '.</b> ' + current.correctReason + '</p>';
    current.options.forEach(o => {
      if(o.key !== current.correct){
        html += '<p><b>Why ' + labelFor(o.key) + ' fails:</b> ' + current.whyFail[o.key] + '</p>';
      }
    });
    return html;
  };
  revealBox.innerHTML = revealHtml();

  const priorSelected = getSelected(current.id);
  const priorResult = getResult(current.id);
  pickedKey = priorSelected || null;
  if(priorSelected && priorResult){
    applyGrading(priorSelected, priorResult === 'correct');
    mcqStatus.textContent = priorResult === 'correct' ? '✓ correct' : '✗ not quite — correct answer highlighted';
  } else {
    mcqStatus.textContent = 'not answered yet';
  }

  revealed = !!priorResult;
  revealBox.classList.toggle('shown', revealed);
  revealBtn.textContent = revealed ? 'Hide answer key' : 'Reveal answer key';
}

function loadQuestion(id){
  current = questions.find(q => q.id === id) || questions[0];
  if([...questionSelect.options].some(o => o.value === current.id)){
    questionSelect.value = current.id;
  }
  renderQuestion();
  loadAnswer();
  wbLoad();
  updateProgress();
}

questionSelect.addEventListener('change', () => {
  if(questionSelect.value) loadQuestion(questionSelect.value);
});

async function init(){
  wbResizeCanvas();
  const res = await fetch('questions.json');
  questions = await res.json();
  buildQuestionSelect();
  loadQuestion(questions[0].id);
}
init();
</script>
